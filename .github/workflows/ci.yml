name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sqlx_js_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/sqlx_js_test

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check library
        run: bunx tsc --noEmit

      - name: Run unit tests
        run: bun test tests

      - name: Migrate example schema
        run: bun bin/sqlx-js.ts migrate run --root example

      - name: Prepare example
        run: bun bin/sqlx-js.ts prepare --root example

      - name: Verify offline cache matches sources
        run: bun bin/sqlx-js.ts prepare --check --root example

      - name: Type-check example
        run: bunx tsc -p example

      - name: Build package
        run: bun run build

      - name: Verify built package entrypoints
        run: |
          node -e 'await import("@onreza/sqlx-js"); console.log("node root import ok")'
          bun -e 'await import("@onreza/sqlx-js"); console.log("bun root import ok")'
          node dist/bin/sqlx-js.js --version

      - name: Verify CLI runs under Node
        run: node dist/bin/sqlx-js.js prepare --check --root example

      - name: Verify npm package contents
        run: npm pack --dry-run
