name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sqlx_js_example
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/sqlx_js_example
      SQLX_JS_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check library
        run: bunx tsc --noEmit

      - name: Run test suite (PostgreSQL 17)
        run: bun test tests --timeout 120000

      - name: Migrate example schema
        run: bun bin/sqlx-js.ts migrate run --root example

      - name: Run provider-aware SQL verification
        run: bun bin/sqlx-js.ts ci --root example

      - name: Verify production query corpus
        run: bun scripts/check-production-corpus.ts

      - name: Type-check example
        run: bunx tsc -p example

      - name: Build package
        run: bun run build

      - name: Verify built package entrypoints
        run: |
          node scripts/check-runtime-boundary.mjs
          node -e 'await import("@onreza/sqlx-js"); console.log("node root import ok")'
          bun -e 'await import("@onreza/sqlx-js"); console.log("bun root import ok")'
          node dist/bin/sqlx-js.js --version

      - name: Verify CLI runs under Node
        run: |
          node dist/bin/sqlx-js.js prepare --check --strict-inference --root example
          node dist/bin/sqlx-js.js prepare --verify --strict-inference --root example
          node dist/bin/sqlx-js.js doctor --json --root example

      - name: Verify packed runtime under Node
        run: node scripts/node-package-smoke.mjs

      - name: Verify npm package contents
        run: npm pack --dry-run

      - name: Create pgschema end-to-end database
        env:
          ADMIN_DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
        run: >-
          bun -e 'import postgres from "postgres";
          const sql = postgres(process.env.ADMIN_DATABASE_URL, { max: 1 });
          await sql.unsafe("DROP DATABASE IF EXISTS sqlx_js_pgschema");
          await sql.unsafe("CREATE DATABASE sqlx_js_pgschema");
          await sql.end();'

      - name: Install and verify pinned pgschema
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/sqlx_js_pgschema
        run: |
          bun bin/sqlx-js.ts pgschema install --root tests/fixtures/pgschema
          bun bin/sqlx-js.ts doctor --root tests/fixtures/pgschema

      - name: Plan and apply schema with the real pgschema binary
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/sqlx_js_pgschema
          PLAN_PATH: ${{ runner.temp }}/sqlx-js-pgschema-plan.json
        run: |
          bun bin/sqlx-js.ts pgschema plan --root tests/fixtures/pgschema -- --output-json "$PLAN_PATH" --no-color
          bun bin/sqlx-js.ts pgschema apply --root tests/fixtures/pgschema -- --plan "$PLAN_PATH" --auto-approve
          bun -e 'import postgres from "postgres"; const sql = postgres(process.env.DATABASE_URL); const rows = await sql.unsafe("SELECT name FROM pgschema_probe"); if (rows.length !== 0) throw new Error("expected empty probe table"); await sql.end();'

      - name: Verify pgschema plan is idempotent
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/sqlx_js_pgschema
          PLAN_PATH: ${{ runner.temp }}/sqlx-js-pgschema-second-plan.json
        run: |
          bun bin/sqlx-js.ts pgschema plan --root tests/fixtures/pgschema -- --output-json "$PLAN_PATH" --no-color
          node -e 'const plan = require(process.env.PLAN_PATH); if (plan.groups?.length) throw new Error("pgschema plan is not idempotent")'

      - name: Verify pgschema desired-state shadow workflow
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/sqlx_js_pgschema
        run: |
          bun -e 'import postgres from "postgres"; const sql = postgres(process.env.DATABASE_URL); await sql.unsafe("DROP TABLE pgschema_probe"); await sql.unsafe("CREATE TABLE pgschema_target_guard (id bigint PRIMARY KEY)"); await sql.end();'
          bun bin/sqlx-js.ts verify --root tests/fixtures/pgschema --strict-inference
          bun bin/sqlx-js.ts dev --root tests/fixtures/pgschema --strict-inference
          bunx tsc -p tests/fixtures/pgschema
          git diff --exit-code -- tests/fixtures/pgschema
          bun -e 'import postgres from "postgres"; const sql = postgres(process.env.DATABASE_URL); const rows = await sql.unsafe("SELECT to_regclass($1)::text AS desired, to_regclass($2)::text AS guard", ["public.pgschema_probe", "public.pgschema_target_guard"]); if (rows[0]?.desired !== null || rows[0]?.guard !== "pgschema_target_guard") throw new Error("dev/verify changed the target database"); await sql.end();'

  postgres-compatibility:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - pgvector/pgvector:pg16
          - pgvector/pgvector:pg18

    services:
      postgres:
        image: ${{ matrix.image }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sqlx_js_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      SQLX_JS_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/sqlx_js_test

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run PostgreSQL integration matrix
        run: bun test tests/prepare.integration.test.ts --timeout 120000

  platform-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run offline cross-platform suite
        run: >-
          bun test
          tests/scanner.test.ts
          tests/scanner-edges.test.ts
          tests/cache.test.ts
          tests/artifacts.test.ts
          tests/codegen.test.ts
          tests/runtime.test.ts
          --timeout 120000

      - name: Build package
        run: bun run build
