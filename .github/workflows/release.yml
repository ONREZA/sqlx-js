name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish manually (e.g. v0.0.0). Leave empty for normal release-please flow."
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish to npm
    needs: [release-please]
    if: |
      always() &&
      ((github.event_name == 'push' && needs.release-please.outputs.release_created == 'true') ||
       (github.event_name == 'workflow_dispatch' && inputs.tag != ''))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sqlx_js_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/sqlx_js_test

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || needs.release-please.outputs.tag_name }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm to latest (trusted publishing requires >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check library
        run: bunx tsc --noEmit

      - name: Run unit tests
        run: bun test tests

      - name: Migrate example schema
        run: bun bin/sqlx-js.ts migrate run --root example

      - name: Prepare example
        run: bun bin/sqlx-js.ts prepare --root example

      - name: Verify offline cache matches sources
        run: bun bin/sqlx-js.ts prepare --check --root example

      - name: Type-check example
        run: bunx tsc -p example

      - name: Build package
        run: bun run build

      - name: Verify built package entrypoints
        run: |
          node -e 'await import("@onreza/sqlx-js"); console.log("node root import ok")'
          bun -e 'await import("@onreza/sqlx-js/bun"); console.log("bun adapter import ok")'
          node dist/bin/sqlx-js.js --version

      - name: Verify npm package contents
        run: npm pack --dry-run

      - name: Verify package.json version matches tag
        env:
          TAG_RAW: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || needs.release-please.outputs.tag_name }}
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${TAG_RAW#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public --tag latest
